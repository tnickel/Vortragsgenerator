# Server Configuration
server.port=8080

# H2 Database Configuration
spring.datasource.url=jdbc:h2:file:./data/vortrag_db;DB_CLOSE_DELAY=-1;AUTO_SERVER=TRUE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update

# H2 Console Settings (Allows monitoring db state)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# Database Init Configuration
spring.sql.init.mode=always

# Storage Directories
app.storage.dir=./data

# API Defaults
app.openrouter.api-key=${OPENROUTER_API_KEY:}
app.openrouter.url=https://openrouter.ai/api/v1/chat/completions
app.elevenlabs.api-key=${ELEVENLABS_API_KEY:}
app.elevenlabs.voice-id=${ELEVENLABS_VOICE_ID:}
